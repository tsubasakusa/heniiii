# Alembic Configuration File
# This file contains the configuration related to a particular set
# of migrations.  The values here are augmented from what comes back
# from the environment during the 'env.py' module execution; refer to
# the 'sqlalchemy.url' value below to alter how the database is accessed.
#
# For logging configuration, add loggers section to __init__.py.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
#file_template = %%(rev)s_%%(create_date)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# string value is passed to the constructor of datetime.datetime
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field in file_template
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# sqlalchemy_echo =

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# sqlalchemy_echo =

# NOTE: this value is read from the environment during the 'env.py'
# module execution. The sqlalchemy.url is left blank intentionally
# as it is configured via app.config.settings.database_url
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
